<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>經濟與民主模擬（最終版）</title>

<style>
body {
    margin:0;
    font-family: "Segoe UI";
    background: linear-gradient(135deg,#1e1e2f,#2c2c54);
    color:white;
}
.container { max-width:900px;margin:auto;padding:20px; }

.card {
    background: rgba(255,255,255,0.08);
    border-radius:15px;
    padding:15px;
    margin:10px 0;
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
    animation:fadeIn 0.6s ease;
}

button {
    background:linear-gradient(135deg,#6c5ce7,#00cec9);
    border:none;padding:10px;
    margin:5px;border-radius:10px;
    color:white;cursor:pointer;
}
button:hover{ transform:scale(1.05); }
button:active{ transform:scale(0.95); }

input{padding:10px;border-radius:8px;border:none;}

@keyframes fadeIn {
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>
<div class="container">

<h1>🏛️ 經濟與民主模擬</h1>
<button onclick="login()">🔐 Google登入</button>

<div class="card">
<h3>⏰ 遊戲狀態</h3>
<p id="phase"></p>
<p id="countdown"></p>
</div>

<div class="card">
<h3>👤 玩家</h3>
<p id="name"></p>
<p>💰 資產：<span id="money"></span></p>
</div>

<div class="card">
<h3>📊 經濟</h3>
<p>通膨：<span id="inflation"></span></p>
<p>支持率：<span id="support"></span></p>
</div>

<div class="card">
<h3>🎯 行動</h3>
<button onclick="work(true)">上班</button>
<button onclick="work(false)">不上班</button>
<button onclick="consume()">消費</button>
<button onclick="noConsume()">不消費</button>
</div>

<div class="card">
<h3>🏛️ 政策（政府）</h3>
<button onclick="policy('stimulus')">刺激經濟</button>
<button onclick="policy('tax')">提高稅</button>
<button onclick="policy('wage')">提高薪資</button>
</div>

<div class="card">
<h3>🪧 參選</h3>
<input id="manifesto" placeholder="政見">
<button onclick="register()">參選</button>
</div>

<div class="card">
<h3>🗳️ 候選人</h3>
<div id="candidates"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, getDoc, getDocs, collection, onSnapshot, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { getAuth, signInWithPopup, GoogleAuthProvider }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBtWQhYT978hquv84_nEqRrOjqA817TVUY",
    authDomain: "economic-project-d8d72.firebaseapp.com",
    databaseURL: "https://economic-project-d8d72-default-rtdb.firebaseio.com",
    projectId: "economic-project-d8d72"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let user, player={money:100,worked:false,consumed:false};

/* 登入 */
async function login(){
    let res = await signInWithPopup(auth, provider);
    user = res.user;

    await setDoc(doc(db,"players",user.uid),{
        name:user.displayName,
        worked:false,
        consumed:false
    });

    document.getElementById("name").innerText = user.displayName;

    startGame();
}

/* 初始化遊戲 */
async function startGame(){
    let ref = doc(db,"game","state");
    let snap = await getDoc(ref);

    if(!snap.exists()){
        await setDoc(ref,{
            phase:"register",
            phaseStart: serverTimestamp(),
            support:100,
            inflation:2,
            policy:{gov:1,tax:1,wage:1}
        });
    }
}

/* 行為 */
async function work(c){
    player.worked=c;
    await updateDoc(doc(db,"players",user.uid),{worked:c});
}

async function consume(){
    player.consumed=true;
    player.money-=20;
    await updateDoc(doc(db,"players",user.uid),{consumed:true});
}

async function noConsume(){
    player.consumed=false;
    await updateDoc(doc(db,"players",user.uid),{consumed:false});
}

/* 政策 */
async function policy(type){
    let ref = doc(db,"game","state");
    let snap = await getDoc(ref);
    let data = snap.data();

    if(data.leader !== user.uid){
        alert("只有政府可改");
        return;
    }

    let p = data.policy;
    if(type==="stimulus") p.gov++;
    if(type==="tax") p.tax++;
    if(type==="wage") p.wage++;

    await updateDoc(ref,{policy:p});
}

/* 參選 */
async function register(){
    let m = document.getElementById("manifesto").value;
    await setDoc(doc(db,"candidates",user.uid),{
        name:user.displayName,
        manifesto:m
    });
}

/* 投票 */
async function vote(id){
    let ref = doc(db,"votes",user.uid);
    let snap = await getDoc(ref);

    if(snap.exists()){
        alert("已投票");
        return;
    }

    await setDoc(ref,{candidateId:id});
}

/* 候選人UI */
onSnapshot(collection(db,"candidates"),snap=>{
    let div = document.getElementById("candidates");
    div.innerHTML="";

    snap.forEach(d=>{
        let data = d.data();

        let el = document.createElement("div");
        el.className="card";
        el.innerHTML=`
        <b>${data.name}</b>
        <p>${data.manifesto}</p>
        <button onclick="vote('${d.id}')">投票</button>
        `;
        div.appendChild(el);
    });
});

/* 經濟 */
onSnapshot(collection(db,"players"), async snap=>{

    let players=[];
    snap.forEach(d=>players.push(d.data()));

    let gameRef = doc(db,"game","state");
    let game = (await getDoc(gameRef)).data();

    if(players.length===0){
        await updateDoc(gameRef,{inflation:2,support:100});
        return;
    }

    let workRate = players.filter(p=>p.worked).length/players.length;
    let consumeRate = players.filter(p=>p.consumed).length/players.length;

    let inflation =
        2 + 2*consumeRate -1.5*workRate
        +0.5*game.policy.gov
        -0.4*game.policy.tax
        +0.3*game.policy.wage;

    let support = Math.max(0,100 - inflation*5);

    await updateDoc(gameRef,{inflation,support});
});

/* UI */
onSnapshot(doc(db,"game","state"), snap=>{
    let g = snap.data();
    if(!g) return;

    document.getElementById("inflation").innerText = g.inflation.toFixed(2);

    let s = g.support;
    let el = document.getElementById("support");
    el.innerText = s.toFixed(0);

    if(s>70) el.style.color="#00ffcc";
    else if(s>40) el.style.color="#ffd166";
    else el.style.color="#ff6b6b";

    document.getElementById("phase").innerText = g.phase;
});

/* 倒數 */
setInterval(async ()=>{
    let snap = await getDoc(doc(db,"game","state"));
    let g = snap.data();
    if(!g) return;

    let start = g.phaseStart.toDate().getTime();
    let now = Date.now();

    let duration = g.phase==="register"?10:
                   g.phase==="vote"?20:1440;

    let remain = duration*60000 - (now-start);

    let m = Math.floor(remain/60000);
    let s = Math.floor((remain%60000)/1000);

    document.getElementById("countdown").innerText =
        `${m}分 ${s}秒`;

},1000);

</script>
</body>
</html>
