<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>政治經濟模擬 V18</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBtWQhYT978hquv84_nEqRrOjqA817TVUY",
    authDomain: "economic-project-d8d72.firebaseapp.com",
    databaseURL: "https://economic-project-d8d72-default-rtdb.firebaseio.com",
    projectId: "economic-project-d8d72"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

#startScreen{
position:fixed;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.4);
}

#map{
width:600px;
height:300px;
background:#87ceeb;
border-radius:15px;
position:relative;
overflow:hidden;
}

#player{
position:absolute;
font-size:40px;
left:50px;
top:200px;
transition:0.2s;
}

.panel{
background:rgba(0,0,0,0.4);
padding:6px 10px;
margin:5px;
border-radius:10px;
display:inline-block;
}

button{
padding:6px 10px;
border:none;
border-radius:8px;
cursor:pointer;
margin:3px;
background:#00c6ff;
color:white;
}

button:disabled{
opacity:0.4;
cursor:not-allowed;
}

.playerCard{
background:rgba(255,255,255,0.1);
padding:5px;
margin:5px;
border-radius:8px;
}

.candCard{
background:rgba(255,255,255,0.15);
padding:8px;
margin:5px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- 🎬 START -->
<div id="startScreen">

<h1>🌍 政治經濟模擬 V18</h1>

<input id="nameInput" placeholder="名字"><br><br>

<select id="avatar">
<option>🧑</option>
<option>👩</option>
<option>👨</option>
<option>🦸</option>
<option>🧙</option>
</select>

<br><br>

<button onclick="startGame()">開始遊戲</button>

</div>

<!-- 🎮 GAME -->
<div id="game" style="display:none;">

<!-- HUD -->
<div>
<div class="panel">💰 <span id="money">1000</span></div>
<div class="panel">📊 <span id="inflation">1.0</span></div>
<div class="panel">⚔ <span id="war">和平</span></div>
<div class="panel">🗳 <span id="phase">候選階段</span></div>
<div class="panel">⏳ <span id="timer">30</span></div>
</div>

<div id="map">
<div id="player">🧑</div>
</div>

<br>

<button onclick="work()">💼 工作</button>
<button onclick="buy()">🛒 消費</button>

<button id="candBtn" onclick="beCandidate()">🗳 參選</button>

<hr>

<h3>🗳 候選人（點擊投票）</h3>
<div id="candidateList"></div>

<h3>👥 玩家</h3>
<div id="playerWall"></div>

<h3>🏆 排行榜</h3>
<ol id="board"></ol>

</div>

<script>

let playerId="p"+Math.random();

let player={
name:"",
avatar:"🧑",
money:1000
};

let x=50,y=200;

let inflation=1.0;
let war=false;

// 🧠 選舉系統
let phase="candidate";
let timeLeft=30;
let candidateTime=30;
let voteTime=30;

// ================= 開始 =================
function startGame(){

player.name=nameInput.value;
player.avatar=avatar.value;

document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";

document.getElementById("player").innerText=player.avatar;

sync();
listenPlayers();
listenCandidates();
listenSettings();

initSettings();
randomWar();
electionClock();

}

// ================= 玩家同步 =================
function sync(){
db.ref("players/"+playerId).set(player);
}

// ================= 玩家列表 =================
function listenPlayers(){

db.ref("players").on("value",snap=>{

let wall=document.getElementById("playerWall");
wall.innerHTML="";

let list=[];

snap.forEach(s=>{
let p=s.val();
list.push(p);

let d=document.createElement("div");
d.className="playerCard";
d.innerText=p.avatar+" "+p.money;
wall.appendChild(d);
});

list.sort((a,b)=>b.money-a.money);

let board=document.getElementById("board");
board.innerHTML="";
list.forEach(p=>{
let li=document.createElement("li");
li.innerText=p.avatar+" "+p.money;
board.appendChild(li);
});

});

}

// ================= 候選人顯示 =================
function listenCandidates(){

db.ref("candidates").on("value",snap=>{

let box=document.getElementById("candidateList");
box.innerHTML="";

let data=snap.val();
if(!data) return;

Object.keys(data).forEach(id=>{

db.ref("players/"+id).once("value",pSnap=>{

let p=pSnap.val();
if(!p) return;

let div=document.createElement("div");
div.className="candCard";

div.innerHTML=`
🗳 ${p.avatar} ${p.name || "匿名"}
<br>
📊 票數：<span id="vote_${id}">0</span>
`;

div.onclick=()=>voteFor(id);

box.appendChild(div);

listenVotes(id);

});

});

});

}

// ================= 投票 =================
function voteFor(id){

if(phase!=="voting") return;

db.ref("votes/"+id).transaction(v=> (v||0)+1);

}

// ================= 即時票數 =================
function listenVotes(id){

db.ref("votes/"+id).on("value",snap=>{

let v=snap.val() || 0;

let el=document.getElementById("vote_"+id);
if(el) el.innerText=v;

});

}

// ================= 參選 =================
function beCandidate(){

if(phase!=="candidate") return;

db.ref("candidates/"+playerId).set({
name:player.name,
avatar:player.avatar
});

}

// ================= 移動 =================
function go(tx,ty){

let p=document.getElementById("player");

let t=setInterval(()=>{

let dx=tx-x;
let dy=ty-y;

x+=dx*0.1;
y+=dy*0.1;

p.style.left=x+"px";
p.style.top=y+"px";

p.style.transform="translateY("+Math.sin(Date.now()/100)*2+"px)";

if(Math.abs(dx)<2) clearInterval(t);

},16);

}

// ================= 經濟 =================
function work(){
go(450,120);
setTimeout(()=>{
player.money+=100*(war?0.7:1);
inflation+=0.02;
sync();update();
},1200);
}

function buy(){
go(250,120);
setTimeout(()=>{
player.money-=50;
inflation+=0.03;
sync();update();
},1200);
}

// ================= 戰爭 =================
function randomWar(){

setInterval(()=>{

if(!war && Math.random()<0.2){
war=true;
document.getElementById("war").innerText="戰爭";

setTimeout(()=>{
war=false;
document.getElementById("war").innerText="和平";
},8000);

}

},7000);

}

// ================= 選舉系統（後台控制） =================
function initSettings(){

db.ref("settings").once("value",snap=>{

if(!snap.val()){
db.ref("settings").set({
phase:"candidate",
timeLeft:30,
candidateTime:30,
voteTime:30
});
}

});

}

function listenSettings(){

db.ref("settings").on("value",snap=>{

let s=snap.val();
if(!s) return;

phase=s.phase;
timeLeft=s.timeLeft;

updateUI();

});

}

// ================= 時間系統 =================
function electionClock(){

setInterval(()=>{

db.ref("settings").once("value",snap=>{

let s=snap.val();
if(!s) return;

let t=s.timeLeft-1;
let newPhase=s.phase;

if(t<=0){

if(newPhase==="candidate"){
newPhase="voting";
t=s.voteTime;
db.ref("candidates").set({});
}

else{
newPhase="candidate";
t=s.candidateTime;
db.ref("votes").set({});
}

}

db.ref("settings").update({
phase:newPhase,
timeLeft:t
});

});

},1000);

}

// ================= UI =================
function update(){
money.innerText=player.money.toFixed(0);
inflation.innerText=inflation.toFixed(2);
}

function updateUI(){

document.getElementById("phase").innerText =
phase==="candidate"?"🟡參選":"🔵投票";

document.getElementById("timer").innerText=timeLeft;

// 按鈕鎖定
document.getElementById("candBtn").disabled=(phase!=="candidate");

}

update();

</script>

</body>
</html>
